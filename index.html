  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        var host = window.location.hostname;
        var isInIframe = (function () { try { return window.self !== window.top; } catch (e) { return true; } })();
        var isLovableEditorPreview =
          host === 'localhost' ||
          host === '127.0.0.1' ||
          host.indexOf('lovableproject.com') !== -1 ||
          host.indexOf('id-preview--') === 0 ||
          isInIframe;
        var isLocalPreview = isLovableEditorPreview;

        if (isLocalPreview) {
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            registrations.forEach(function (registration) {
              registration.unregister();
            });
          });
          if ('caches' in window) {
            caches.keys().then(function (keys) {
              keys.forEach(function (key) {
                if (key.startsWith('mahbook-')) caches.delete(key);
              });
            });
          }
        }

        window.addEventListener('load', function () {
          if (isLocalPreview) return;

          navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(function (reg) {
            // Notify the app when a new SW has finished installing and is waiting.
            function notifyWaiting(worker) {
              if (!worker) return;
              window.dispatchEvent(new CustomEvent('mahbook:sw-waiting', { detail: { worker: worker } }));
            }

            if (reg.waiting && navigator.serviceWorker.controller) notifyWaiting(reg.waiting);

            reg.addEventListener('updatefound', function () {
              var installing = reg.installing;
              if (!installing) return;
              console.info('[MahBook SW] updatefound', { state: installing.state });
              installing.addEventListener('statechange', function () {
                console.info('[MahBook SW] statechange', { state: installing.state });
                if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                  notifyWaiting(installing);
                }
              });
            });

            // Reload exactly once when the new SW takes control.
            var refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', function () {
              if (refreshing) return;
              if (navigator.onLine === false) return;
              refreshing = true;
              window.location.reload();
            });

            // Periodically check for updates (every 30 min and on tab focus).
            setInterval(function () { reg.update().catch(function () {}); }, 30 * 60 * 1000);
            document.addEventListener('visibilitychange', function () {
              if (document.visibilityState === 'visible') reg.update().catch(function () {});
            });
          }).catch(function (err) {
            console.warn('[MahBook SW] Registration failed:', err);
          });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
